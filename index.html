<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake 125328022026</title>

<style>
body{
    margin:0;
    background:#111;
    font-family:Arial, sans-serif;
    height:100vh;
    overflow:hidden;
}

canvas{
    background:#181818;
    display:none;
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    z-index:1;
}

.menu{
    position:absolute;
    left:40px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:20px;
    z-index:2;
}

button{
    padding:15px 30px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:8px;
    font-weight:bold;
}

#playBtn{background:lime;}
#customBtn{background:cyan;}
#quitBtn{background:#ff5555;}

#fullscreenBtn{
    position:absolute;
    top:10px;
    right:10px;
    z-index:5;
}

#scoreBoard{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    display:none;
    font-size:18px;
    z-index:4;
}

#overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    gap:20px;
    z-index:1000;
}

#customOverlay{
    position:fixed;
    inset:0;
    background:#111;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:2000;
}

#customContent{
    width:80%;
    height:80%;
    display:flex;
    background:#1a1a1a;
    border-radius:12px;
    padding:40px;
    gap:40px;
}

#leftPanel{
    width:40%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    color:white;
}

#rightPanel{
    width:60%;
    color:white;
}

#colorPalette{
    display:grid;
    grid-template-columns:repeat(8, 40px);
    gap:10px;
    margin-top:20px;
}

.colorSwatch{
    width:40px;
    height:40px;
    border-radius:6px;
    cursor:pointer;
    border:2px solid #333;
}

.colorSwatch:hover{
    border:2px solid white;
}
</style>
</head>
<body>

<!-- MAIN MENU -->
<div class="menu" id="mainMenu">
    <button id="playBtn">Play</button>
    <button id="customBtn">Customize Snake</button>
    <button id="quitBtn">Quit</button>
</div>

<!-- CUSTOMIZE OVERLAY -->
<div id="customOverlay">
    <div id="customContent">

        <div id="leftPanel">
            <h2 style="color:white;">Snake Preview</h2>
            <canvas id="previewCanvas" width="200" height="200"></canvas>
        </div>

        <div id="rightPanel">
            <h2>Select Color</h2>
            <div id="colorPalette"></div>
            <br>
            <button id="closeCustom">Back</button>
        </div>

    </div>
</div>

<!-- PAUSE -->
<div id="overlay">
    <button id="resumeBtn">Resume</button>
    <button id="menuBtn">Main Menu</button>
</div>

<div id="scoreBoard">
    Highscore: <span id="highScore">0</span><br>
    Score: <span id="score">0</span>
</div>

<button id="fullscreenBtn">Toggle Fullscreen</button>

<canvas id="game"></canvas>

<script>

/* ===== GAME SETUP ===== */

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const gridSize=25;
const tileSize=24;
canvas.width=gridSize*tileSize;
canvas.height=gridSize*tileSize;

let snake,direction,nextDirection,food;
let shrinkTimer=0;
let gameStarted=false;
let paused=false;

let score=0;
let highScore=localStorage.getItem("snakeHighScore")||0;
document.getElementById("highScore").textContent=highScore;

let snakeColor=localStorage.getItem("snakeColor")||"#00FF00";

const speed=6;
let lastTime=0;
let accumulator=0;

/* ===== GAME FUNCTIONS ===== */

function resetGame(){
    snake=[{x:12,y:12},{x:11,y:12},{x:10,y:12}];
    direction={x:1,y:0};
    nextDirection={x:1,y:0};
    spawnFood();
    score=0;
    updateScore();
    shrinkTimer=0;
}

function spawnFood(){
    food={
        x:Math.floor(Math.random()*gridSize),
        y:Math.floor(Math.random()*gridSize)
    };
}

function updateScore(){
    document.getElementById("score").textContent=score;
    if(score>highScore){
        highScore=score;
        localStorage.setItem("snakeHighScore",highScore);
        document.getElementById("highScore").textContent=highScore;
    }
}

function togglePause(){
    paused=!paused;
    document.getElementById("overlay").style.display=paused?"flex":"none";
}

document.addEventListener("keydown",e=>{
    if(gameStarted && !paused){
        let newDir=null;
        if(e.key==="ArrowUp"||e.key==="w")newDir={x:0,y:-1};
        if(e.key==="ArrowDown"||e.key==="s")newDir={x:0,y:1};
        if(e.key==="ArrowLeft"||e.key==="a")newDir={x:-1,y:0};
        if(e.key==="ArrowRight"||e.key==="d")newDir={x:1,y:0};
        if(newDir) nextDirection=newDir;
        if(e.key==="Escape") togglePause();
    }else if(gameStarted && paused){
        if(e.key==="Escape") togglePause();
    }
});

function update(){

    if(snake.length === 0) return;

    direction = nextDirection;

    const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
    };

    // ===== SEINÄ TÖRMÄYS (AINOA KUOLEMA) =====
    if(head.x<0||head.y<0||head.x>=gridSize||head.y>=gridSize){

        shrinkTimer++;

        if(shrinkTimer%2===0 && snake.length>0){
            snake.pop();
        }

        if(snake.length===0){
            setTimeout(()=>resetGame(),200);
        }

        return;

    }else{
        shrinkTimer=0;
    }

    // Normaali liike
    snake.unshift(head);

    if(head.x===food.x && head.y===food.y){
        score++;
        updateScore();
        spawnFood();
    }else{
        snake.pop();
    }
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="cyan";
    ctx.fillRect(food.x*tileSize,food.y*tileSize,tileSize,tileSize);

    ctx.fillStyle=snakeColor;
    snake.forEach(seg=>{
        ctx.fillRect(seg.x*tileSize,seg.y*tileSize,tileSize,tileSize);
    });
}

function gameLoop(timestamp){
    if(!gameStarted) return;
    requestAnimationFrame(gameLoop);

    if(paused){
        lastTime=timestamp;
        return;
    }

    if(!lastTime) lastTime=timestamp;
    const delta=(timestamp-lastTime)/1000;
    lastTime=timestamp;
    accumulator+=delta;

    const step=1/speed;
    while(accumulator>=step){
        update();
        accumulator-=step;
    }

    draw();
}

/* ===== MENU BUTTONS ===== */

document.getElementById("playBtn").onclick=()=>{
    document.getElementById("mainMenu").style.display="none";
    document.getElementById("scoreBoard").style.display="block";
    canvas.style.display="block";
    gameStarted=true;
    paused=false;
    resetGame();
    requestAnimationFrame(gameLoop);
};

document.getElementById("quitBtn").onclick=()=>{
    window.close();
};

document.getElementById("resumeBtn").onclick=togglePause;

document.getElementById("menuBtn").onclick=()=>{
    paused=false;
    gameStarted=false;
    document.getElementById("overlay").style.display="none";
    document.getElementById("scoreBoard").style.display="none";
    canvas.style.display="none";
    document.getElementById("mainMenu").style.display="flex";
};

document.getElementById("fullscreenBtn").onclick=()=>{
    if(!document.fullscreenElement)
        document.documentElement.requestFullscreen();
    else document.exitFullscreen();
};

/* ===== CUSTOMIZE SYSTEM ===== */

const customOverlay=document.getElementById("customOverlay");
const previewCanvas=document.getElementById("previewCanvas");
const pctx=previewCanvas.getContext("2d");
const palette=document.getElementById("colorPalette");

// Värit
const colors=[
"#00FF00","#FF0000","#0000FF","#FFFF00","#FF00FF","#00FFFF",
"#FFA500","#FF69B4","#8A2BE2","#00FA9A","#DC143C","#1E90FF",
"#FFD700","#ADFF2F","#FF4500","#7FFF00","#40E0D0","#FF1493",
"#B22222","#00CED1","#9400D3","#FF8C00","#32CD32","#4682B4"
];

colors.forEach(color=>{
    const div=document.createElement("div");
    div.className="colorSwatch";
    div.style.background=color;
    div.onclick=()=>{
        snakeColor=color;
        localStorage.setItem("snakeColor",color);
        drawPreview();
    };
    palette.appendChild(div);
});

// ===== Snake preview animation =====
let previewAngle=0;

function drawPreview(){
    const ctx = pctx;
    ctx.clearRect(0,0,previewCanvas.width,previewCanvas.height);

    const centerX = previewCanvas.width/2;
    const centerY = previewCanvas.height/2;
    const radius = 50;
    const size = 28;

    // Luo mato 4 palikasta
    const segments = 4;
    for(let i=0;i<segments;i++){
        const angle = previewAngle - i*0.3;
        const x = centerX + Math.cos(angle)*radius;
        const y = centerY + Math.sin(angle)*radius;
        ctx.fillStyle = snakeColor;
        ctx.fillRect(x-size/2,y-size/2,size,size);
    }

    // Pyöritys seuraavaa framea varten
    previewAngle += 0.05;
    requestAnimationFrame(drawPreview);
}

// Customize-nappi
document.getElementById("customBtn").onclick=()=>{
    document.getElementById("mainMenu").style.display="none";
    customOverlay.style.display="flex";
    drawPreview();
};

document.getElementById("closeCustom").onclick=()=>{
    customOverlay.style.display="none";
    document.getElementById("mainMenu").style.display="flex";
};

</script>
</body>
</html>
