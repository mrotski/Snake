<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake.io Mini</title>
<style>
body{
    margin:0;
    background:#111;
    font-family:Arial, sans-serif;
    height:100vh;
    overflow:hidden;
}

canvas{
    background:#181818;
    display:none;
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    z-index:1; /* canvas taustalle */
}

.menu{
    position:absolute;
    left:40px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:20px;
    z-index:2; /* menu päällä canvasin */
}

button{
    padding:15px 30px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:8px;
    font-weight:bold;
    outline:none;
}

button:focus{
    outline:4px solid grey;
}

#playBtn{background:lime;}
#customBtn{background:cyan;}
#quitBtn{background:#ff5555;}

#fullscreenBtn{
    position:absolute;
    top:10px;
    right:10px;
    z-index:5;
}

#colorPanel{
    position:absolute;
    left:250px;
    top:50%;
    transform:translateY(-50%);
    background:#222;
    padding:20px;
    display:none;
    z-index:3; /* color panel overlay menu-painikkeiden päällä */
}

#colorOptions button{
    width:30px;
    height:30px;
    border:none;
    margin:2px;
    cursor:pointer;
}

#overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    gap:20px;
    z-index:100000; /* korkein overlay */
}

#mobileEsc{
    position:fixed;
    top:20px;
    right:20px;
    display:none;
    z-index:100001; /* overlay +1 */
    background:#ff5555;
    font-size:18px;
    padding:10px 15px;
}

#mobileControls{
    position:fixed;
    bottom:20px;
    left:20px;
    display:none;
    gap:10px;
    z-index:4;
}

#scoreBoard{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    display:none;
    font-size:18px;
    z-index:4;
}

.pop{
    animation:popAnim 0.3s ease-out;
}

@keyframes popAnim{
    0%{transform:scale(1);}
    50%{transform:scale(1.5);}
    100%{transform:scale(0);}
}
</style>
</head>
<body>

<div class="menu" id="mainMenu">
    <button id="playBtn">Play</button>
    <button id="customBtn">Customize Snake</button>
    <button id="quitBtn">Quit</button>
</div>

<div id="colorPanel">
    <label style="color:white;">Select Snake Color:</label><br><br>
    <div id="colorOptions">
        <button style="background:#00FF00;" data-color="#00FF00"></button>
        <button style="background:#FF0000;" data-color="#FF0000"></button>
        <button style="background:#0000FF;" data-color="#0000FF"></button>
        <button style="background:#FFFF00;" data-color="#FFFF00"></button>
        <button style="background:#FF00FF;" data-color="#FF00FF"></button>
    </div>
</div>

<div id="overlay">
    <button id="resumeBtn">Resume</button>
    <button id="menuBtn">Main Menu</button>
</div>

<button id="mobileEsc">ESC</button>

<div id="scoreBoard">
    Highscore: <span id="highScore">0</span><br>
    Score: <span id="score">0</span>
</div>

<div id="mobileControls">
    <button id="upBtn">↑</button><br>
    <button id="leftBtn">←</button>
    <button id="downBtn">↓</button>
    <button id="rightBtn">→</button>
</div>

<button id="fullscreenBtn">Toggle Fullscreen</button>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const gridSize=25;
const tileSize=24;
canvas.width=gridSize*tileSize;
canvas.height=gridSize*tileSize;

let snake,direction,nextDirection,food;
let shrinkTimer=0;
let gameStarted=false;
let paused=false;

let score=0;
let highScore=localStorage.getItem("snakeHighScore")||0;
document.getElementById("highScore").textContent=highScore;

let snakeColor=localStorage.getItem("snakeColor")||"#00FF00";

const speed=6;
let lastTime=0;
let accumulator=0;

function resetGame(){
    snake=[{x:12,y:12},{x:11,y:12},{x:10,y:12}];
    direction={x:1,y:0};
    nextDirection={x:1,y:0};
    spawnFood();
    shrinkTimer=0;
    score=0;
    updateScore();
}

function spawnFood(){
    food={x:Math.floor(Math.random()*gridSize),
          y:Math.floor(Math.random()*gridSize)};
}

function updateScore(){
    document.getElementById("score").textContent=score;
    if(score>highScore){
        highScore=score;
        localStorage.setItem("snakeHighScore",highScore);
        document.getElementById("highScore").textContent=highScore;
    }
}

document.addEventListener("keydown",e=>{
    if(gameStarted && !paused){
        let newDir=null;
        if(e.key==="ArrowUp"||e.key==="w")newDir={x:0,y:-1};
        if(e.key==="ArrowDown"||e.key==="s")newDir={x:0,y:1};
        if(e.key==="ArrowLeft"||e.key==="a")newDir={x:-1,y:0};
        if(e.key==="ArrowRight"||e.key==="d")newDir={x:1,y:0};
        if(newDir) nextDirection = newDir; // 180° allowed
        if(e.key==="Escape") togglePause();
    }else if(gameStarted && paused){
        if(e.key==="Escape") togglePause();
    }
});

function togglePause(){
    paused = !paused;
    document.getElementById("overlay").style.display = paused ? "flex" : "none";
}

function update(){
    direction=nextDirection;
    const head={x:snake[0].x+direction.x,
                y:snake[0].y+direction.y};

    if(head.x<0||head.y<0||head.x>=gridSize||head.y>=gridSize){
        shrinkTimer++;
        if(shrinkTimer%2===0 && snake.length>0){
            snake.pop();
        }
        if(snake.length===0){
            popEffect();
            setTimeout(()=>resetGame(),300);
        }
        return;
    }else shrinkTimer=0;

    snake.unshift(head);

    if(head.x===food.x && head.y===food.y){
        score++;
        updateScore();
        spawnFood();
    }else snake.pop();
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.strokeStyle="#222";
    for(let i=0;i<=gridSize;i++){
        ctx.beginPath();
        ctx.moveTo(i*tileSize,0);
        ctx.lineTo(i*tileSize,canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0,i*tileSize);
        ctx.lineTo(canvas.width,i*tileSize);
        ctx.stroke();
    }

    ctx.shadowBlur=20;
    ctx.shadowColor="red";
    ctx.strokeStyle="red";
    ctx.lineWidth=6;
    ctx.strokeRect(0,0,canvas.width,canvas.height);
    ctx.shadowBlur=0;

    ctx.fillStyle="cyan";
    ctx.fillRect(food.x*tileSize,food.y*tileSize,tileSize,tileSize);

    ctx.fillStyle=snakeColor;
    snake.forEach(seg=>{
        ctx.fillRect(seg.x*tileSize,seg.y*tileSize,tileSize,tileSize);
    });
}

function gameLoop(timestamp){
    if(!gameStarted) return;

    requestAnimationFrame(gameLoop);

    // Jos peli on pausella, vain näytä overlay ja palaa
    if(paused){
        lastTime = timestamp; // estää delta-hyppy pause jälkeen
        return;
    }

    if(!lastTime) lastTime=timestamp;
    const delta=(timestamp-lastTime)/1000;
    lastTime=timestamp;
    accumulator+=delta;

    const step=1/speed;
    while(accumulator>=step){
        update();
        accumulator-=step;
    }

    draw();
}

function popEffect(){
    canvas.classList.add("pop");
    setTimeout(()=>canvas.classList.remove("pop"),300);
}

// Play button
document.getElementById("playBtn").onclick=()=>{
    document.getElementById("mainMenu").style.display="none";
    document.getElementById("colorPanel").style.display="none";
    document.getElementById("scoreBoard").style.display="block";
    canvas.style.display="block";
    gameStarted=true;
    paused=false;
    resetGame();

    if(window.innerWidth<900){
        document.getElementById("mobileControls").style.display="block";
        document.getElementById("mobileEsc").style.display="block";
        if(!document.fullscreenElement){
            document.documentElement.requestFullscreen().catch(()=>{});
        }
    }

    requestAnimationFrame(gameLoop);
};

// Custom Snake panel
document.getElementById("customBtn").onclick=()=>{
    const panel=document.getElementById("colorPanel");
    panel.style.display=panel.style.display==="none"?"block":"none";
};

// Cross-platform color buttons
document.querySelectorAll("#colorOptions button").forEach(btn => {
    btn.onclick = () => {
        snakeColor = btn.dataset.color;
        localStorage.setItem("snakeColor",snakeColor);
    }
});

document.getElementById("quitBtn").onclick=()=>{
    window.close();
};

// Resume and Main Menu overlay buttons
document.getElementById("resumeBtn").onclick=togglePause;

document.getElementById("menuBtn").onclick=()=>{
    paused=false;
    gameStarted=false;
    document.getElementById("overlay").style.display="none";
    document.getElementById("scoreBoard").style.display="none";
    document.getElementById("mobileControls").style.display="none";
    document.getElementById("mobileEsc").style.display="none";
    canvas.style.display="none";
    document.getElementById("mainMenu").style.display="flex";
};

// Fullscreen toggle
document.getElementById("fullscreenBtn").onclick=()=>{
    if(!document.fullscreenElement)
        document.documentElement.requestFullscreen();
    else document.exitFullscreen();
};

// Mobile D-pad
document.getElementById("upBtn").onclick = () => { nextDirection={x:0,y:-1}; };
document.getElementById("downBtn").onclick = () => { nextDirection={x:0,y:1}; };
document.getElementById("leftBtn").onclick = () => { nextDirection={x:-1,y:0}; };
document.getElementById("rightBtn").onclick = () => { nextDirection={x:1,y:0}; };

// Mobile ESC button
document.getElementById("mobileEsc").onclick = togglePause;

// Prevent mobile swipe/scroll
document.addEventListener('touchmove', function(e){ e.preventDefault(); }, {passive:false});
</script>
</body>
</html>
