<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake Game</title>

<style>
body{
    margin:0;
    background:#111;
    font-family:Arial, sans-serif;
    height:100vh;
    overflow:hidden;
    touch-action:none;
}

canvas{
    background:#181818;
    display:none;
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    max-width:95vw;
    max-height:95vh;
}

.menu{
    position:absolute;
    left:40px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:20px;
}

button{
    padding:15px 30px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:8px;
    font-weight:bold;
    outline:none;
}

button:focus{
    outline:4px solid grey;
}

#playBtn{background:lime;}
#customBtn{background:cyan;}
#quitBtn{background:#ff5555;}
#fullscreenMenuBtn{background:orange;}

#colorPanel{
    position:absolute;
    left:250px;
    top:50%;
    transform:translateY(-50%);
    background:#222;
    padding:20px;
    display:none;
}

#overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    gap:20px;
    z-index:9999;
}

#scoreBoard{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    display:none;
    font-size:18px;
}

.pop{
    animation:popAnim 0.3s ease-out;
}

@keyframes popAnim{
    0%{transform:scale(1);}
    50%{transform:scale(1.5);}
    100%{transform:scale(0);}
}

/* ===== MOBILE CONTROLS ===== */
#mobileControls{
    position:fixed;
    bottom:20px;
    left:20px;
    display:none;
    z-index:10000;
}

.dpad{
    display:grid;
    grid-template-columns:60px 60px 60px;
    grid-template-rows:60px 60px 60px;
    gap:5px;
}

.dpad button{
    padding:0;
    font-size:24px;
    background:#333;
    color:white;
    border-radius:10px;
}

#mobileEsc{
    position:fixed;
    top:20px;
    right:20px;
    display:none;
    z-index:10000;
    background:#ff5555;
    font-size:18px;
    padding:10px 15px;
}
</style>
</head>
<body>

<div class="menu" id="mainMenu">
    <button id="playBtn">Play</button>
    <button id="customBtn">Customize Snake</button>
    <button id="fullscreenMenuBtn">Toggle Fullscreen</button>
    <button id="quitBtn">Quit</button>
</div>

<div id="colorPanel">
    <label style="color:white;">Select Snake Color:</label><br><br>
    <input type="color" id="colorPicker">
</div>

<div id="overlay">
    <button id="resumeBtn">Resume</button>
    <button id="menuBtn">Main Menu</button>
</div>

<div id="scoreBoard">
    Highscore: <span id="highScore">0</span><br>
    Score: <span id="score">0</span>
</div>

<!-- MOBILE D-PAD -->
<div id="mobileControls">
    <div class="dpad">
        <div></div>
        <button id="upBtn">↑</button>
        <div></div>
        <button id="leftBtn">←</button>
        <div></div>
        <button id="rightBtn">→</button>
        <div></div>
        <button id="downBtn">↓</button>
        <div></div>
    </div>
</div>

<button id="mobileEsc">ESC</button>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const gridSize=25;
const tileSize=24;
canvas.width=gridSize*tileSize;
canvas.height=gridSize*tileSize;

let snake,direction,nextDirection,food;
let shrinkTimer=0;
let gameStarted=false;
let paused=false;

let score=0;
let highScore=localStorage.getItem("snakeHighScore")||0;
document.getElementById("highScore").textContent=highScore;

let snakeColor=localStorage.getItem("snakeColor")||"#00FF00";
document.getElementById("colorPicker").value=snakeColor;

const speed=6;
let lastTime=0;
let accumulator=0;

function isMobile(){
    return window.innerWidth < 900;
}

function resetGame(){
    snake=[{x:12,y:12},{x:11,y:12},{x:10,y:12}];
    direction={x:1,y:0};
    nextDirection={x:1,y:0};
    spawnFood();
    shrinkTimer=0;
    score=0;
    updateScore();
}

function spawnFood(){
    food={
        x:Math.floor(Math.random()*gridSize),
        y:Math.floor(Math.random()*gridSize)
    };
}

function updateScore(){
    document.getElementById("score").textContent=score;
    if(score>highScore){
        highScore=score;
        localStorage.setItem("snakeHighScore",highScore);
        document.getElementById("highScore").textContent=highScore;
    }
}

document.addEventListener("keydown",e=>{
    if(!gameStarted) return;

    if(e.key==="Escape"){
        togglePause();
        return;
    }

    if(!paused){
        let newDir=null;
        if(e.key==="ArrowUp"||e.key==="w")newDir={x:0,y:-1};
        if(e.key==="ArrowDown"||e.key==="s")newDir={x:0,y:1};
        if(e.key==="ArrowLeft"||e.key==="a")newDir={x:-1,y:0};
        if(e.key==="ArrowRight"||e.key==="d")newDir={x:1,y:0};

        if(newDir && !(newDir.x===-direction.x && newDir.y===-direction.y)){
            nextDirection=newDir;
        }
    }
});

function togglePause(){
    paused=!paused;
    document.getElementById("overlay").style.display=paused?"flex":"none";
}

function update(){
    direction=nextDirection;
    const head={x:snake[0].x+direction.x,
                y:snake[0].y+direction.y};

    if(head.x<0||head.y<0||head.x>=gridSize||head.y>=gridSize){
        shrinkTimer++;
        if(shrinkTimer%2===0 && snake.length>0){
            snake.pop();
        }
        if(snake.length===0){
            popEffect();
            setTimeout(()=>resetGame(),300);
        }
        return;
    }else shrinkTimer=0;

    snake.unshift(head);

    if(head.x===food.x && head.y===food.y){
        score++;
        updateScore();
        if(navigator.vibrate) navigator.vibrate(50);
        spawnFood();
    }else snake.pop();
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="cyan";
    ctx.fillRect(food.x*tileSize,food.y*tileSize,tileSize,tileSize);

    ctx.fillStyle=snakeColor;
    snake.forEach(seg=>{
        ctx.fillRect(seg.x*tileSize,seg.y*tileSize,tileSize,tileSize);
    });
}

function gameLoop(timestamp){
    if(!gameStarted)return;
    requestAnimationFrame(gameLoop);
    if(paused)return;

    if(!lastTime)lastTime=timestamp;
    const delta=(timestamp-lastTime)/1000;
    lastTime=timestamp;
    accumulator+=delta;

    const step=1/speed;
    while(accumulator>=step){
        update();
        accumulator-=step;
    }

    draw();
}

function popEffect(){
    canvas.classList.add("pop");
    setTimeout(()=>canvas.classList.remove("pop"),300);
}

document.getElementById("playBtn").onclick=()=>{
    document.getElementById("mainMenu").style.display="none";
    document.getElementById("colorPanel").style.display="none";
    document.getElementById("scoreBoard").style.display="block";
    canvas.style.display="block";
    gameStarted=true;
    paused=false;
    resetGame();

    if(isMobile()){
        document.getElementById("mobileControls").style.display="block";
        document.getElementById("mobileEsc").style.display="block";
        if(!document.fullscreenElement){
            document.documentElement.requestFullscreen().catch(()=>{});
        }
    }

    requestAnimationFrame(gameLoop);
};

document.getElementById("resumeBtn").onclick=togglePause;

document.getElementById("mobileEsc").onclick=togglePause;

document.getElementById("upBtn").onclick=()=>{
    if(direction.y!==1) nextDirection={x:0,y:-1};
};
document.getElementById("downBtn").onclick=()=>{
    if(direction.y!==-1) nextDirection={x:0,y:1};
};
document.getElementById("leftBtn").onclick=()=>{
    if(direction.x!==1) nextDirection={x:-1,y:0};
};
document.getElementById("rightBtn").onclick=()=>{
    if(direction.x!==-1) nextDirection={x:1,y:0};
};

document.getElementById("menuBtn").onclick=()=>{
    paused=false;
    gameStarted=false;
    document.getElementById("overlay").style.display="none";
    document.getElementById("scoreBoard").style.display="none";
    document.getElementById("mobileControls").style.display="none";
    document.getElementById("mobileEsc").style.display="none";
    canvas.style.display="none";
    document.getElementById("mainMenu").style.display="flex";
};

document.getElementById("fullscreenMenuBtn").onclick=()=>{
    if(!document.fullscreenElement)
        document.documentElement.requestFullscreen();
    else document.exitFullscreen();
};

document.getElementById("quitBtn").onclick=()=>window.close();

document.addEventListener("touchmove", e=>{
    if(gameStarted) e.preventDefault();
},{passive:false});
</script>
</body>
</html>
